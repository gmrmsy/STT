<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STT 데모 — 음성 인식</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c2a;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #00e5a0;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ─── 배경 그리드 ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── 헤더 ─── */
  header {
    position: relative; z-index: 1;
    padding: 3rem 2rem 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .logo-line {
    font-family: var(--mono);
    font-size: .75rem;
    letter-spacing: .25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: .75rem;
  }
  h1 {
    font-family: var(--mono);
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 300;
    letter-spacing: -.02em;
    line-height: 1.1;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    margin-top: .75rem;
    font-size: .9rem;
    color: var(--muted);
    font-weight: 300;
  }

  /* ─── 메인 ─── */
  main {
    position: relative; z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    padding: 3rem 1.5rem 4rem;
    max-width: 700px;
    margin: 0 auto;
    width: 100%;
  }

  /* ─── 탭 ─── */
  .tabs {
    display: flex;
    gap: .5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    width: 100%;
  }
  .tab-btn {
    flex: 1;
    padding: .6rem 1rem;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: .8rem;
    letter-spacing: .05em;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn.active {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* ─── 패널 ─── */
  .panel {
    width: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    animation: fadeIn .25s ease;
  }
  .panel.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ─── 파형 시각화 ─── */
  .waveform-wrap {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  #waveformCanvas {
    width: 100%;
    height: 100px;
    display: block;
  }
  .waveform-label {
    position: absolute;
    top: 8px; left: 12px;
    font-family: var(--mono);
    font-size: .65rem;
    color: var(--muted);
    letter-spacing: .1em;
  }
  .rec-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    margin-right: 4px;
    vertical-align: middle;
  }
  .rec-dot.pulse { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.2;} }

  /* ─── 버튼들 ─── */
  .btn-row { display: flex; gap: .75rem; }
  .btn {
    display: flex; align-items: center; gap: .5rem;
    padding: .7rem 1.6rem;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: .82rem;
    letter-spacing: .05em;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all .2s;
    background: var(--surface2);
    color: var(--text);
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #7b74ff; border-color: #7b74ff; }
  .btn.danger { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .btn.danger:hover { filter: brightness(1.1); }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ─── 타이머 ─── */
  .timer {
    font-family: var(--mono);
    font-size: 1.8rem;
    letter-spacing: .1em;
    color: var(--text);
  }
  .timer.recording { color: var(--accent2); }

  /* ─── 파일 드롭존 ─── */
  .dropzone {
    width: 100%;
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 2.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--surface);
    position: relative;
  }
  .dropzone:hover, .dropzone.over { border-color: var(--accent); background: rgba(108,99,255,.05); }
  .dropzone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .dropzone-icon { font-size: 2.5rem; margin-bottom: .75rem; }
  .dropzone-text { font-size: .9rem; color: var(--muted); }
  .dropzone-text strong { color: var(--accent); }
  .file-info {
    margin-top: .75rem;
    font-family: var(--mono);
    font-size: .75rem;
    color: var(--green);
  }

  /* ─── 결과 박스 ─── */
  .result-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color .3s;
  }
  .result-box.has-result { border-color: var(--green); }
  .result-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .75rem 1.2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .result-header-left {
    display: flex; align-items: center; gap: .5rem;
    font-family: var(--mono);
    font-size: .72rem;
    letter-spacing: .1em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .result-header-left .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--border);
    transition: background .3s;
  }
  .result-box.has-result .dot { background: var(--green); }
  .copy-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: .75rem; font-family: var(--mono);
    transition: color .2s;
    padding: 2px 6px;
  }
  .copy-btn:hover { color: var(--text); }
  .result-body {
    padding: 1.5rem 1.2rem;
    font-size: 1.25rem;
    font-weight: 400;
    line-height: 1.8;
    min-height: 80px;
    color: var(--muted);
    font-style: italic;
  }
  .result-body.filled { color: var(--text); font-style: normal; }

  /* ─── 로딩 ─── */
  .loading-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }
  .loading-bar.active { display: block; }
  .loading-bar::after {
    content: '';
    display: block;
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: slide 1.2s ease-in-out infinite;
  }
  @keyframes slide { 0%{transform:translateX(-150%);} 100%{transform:translateX(350%);} }

  /* ─── 상태 텍스트 ─── */
  .status {
    font-family: var(--mono);
    font-size: .75rem;
    color: var(--muted);
    letter-spacing: .05em;
    min-height: 1.1em;
  }
  .status.ok { color: var(--green); }
  .status.err { color: var(--accent2); }

  /* ─── API URL 설정 ─── */
  .api-config {
    width: 100%;
    display: flex;
    gap: .5rem;
    align-items: center;
  }
  .api-config label {
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--muted);
    letter-spacing: .08em;
    white-space: nowrap;
  }
  .api-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: .78rem;
    padding: .5rem .8rem;
    outline: none;
    transition: border-color .2s;
  }
  .api-input:focus { border-color: var(--accent); }

  /* ─── 푸터 ─── */
  footer {
    position: relative; z-index: 1;
    text-align: center;
    padding: 1.5rem;
    font-family: var(--mono);
    font-size: .7rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="logo-line">Korean STT · Demo</div>
  <h1>음성 → <span>텍스트</span></h1>
  <p class="subtitle">마이크로 녹음하거나 오디오 파일을 업로드하세요</p>
</header>

<main>
  <!-- API URL (숨김) -->
  <input type="hidden" id="apiUrl" value="https://gmsy-STT.hf.space/transcribe" />

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('mic')">🎙 마이크 녹음</button>
    <button class="tab-btn" onclick="switchTab('file')">📁 파일 업로드</button>
  </div>

  <!-- 마이크 패널 -->
  <div class="panel active" id="panel-mic">
    <div class="waveform-wrap">
      <span class="waveform-label"><span class="rec-dot" id="recDot"></span><span id="recLabel">대기 중</span></span>
      <canvas id="waveformCanvas" height="100"></canvas>
    </div>
    <div class="timer" id="timer">00:00</div>
    <div class="btn-row">
      <button class="btn primary" id="btnRecord" onclick="toggleRecord()">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
        녹음 시작
      </button>
      <button class="btn" id="btnSendMic" onclick="sendMic()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        전송
      </button>
    </div>
    <div class="status" id="statusMic"></div>
  </div>

  <!-- 파일 패널 -->
  <div class="panel" id="panel-file">
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept="audio/*" onchange="onFileChange()" />
      <div class="dropzone-icon">🎵</div>
      <div class="dropzone-text">여기에 오디오 파일을 끌어다 놓거나<br/><strong>클릭해서 선택</strong>하세요</div>
      <div class="file-info" id="fileInfo"></div>
    </div>
    <button class="btn primary" id="btnSendFile" onclick="sendFile()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z"/></svg>
      전송하여 변환
    </button>
    <div class="status" id="statusFile"></div>
  </div>

  <!-- 로딩바 -->
  <div class="loading-bar" id="loadingBar"></div>

  <!-- 결과 -->
  <div class="result-box" id="resultBox">
    <div class="result-header">
      <div class="result-header-left">
        <div class="dot"></div>
        인식 결과
      </div>
      <button class="copy-btn" onclick="copyResult()">복사</button>
    </div>
    <div class="result-body" id="resultText">인식된 텍스트가 여기에 표시됩니다.</div>
  </div>
</main>

<footer>음성 인식 데모 · Powered by Custom Korean STT Model</footer>

<script>
// ─── 탭 전환 ───
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='mic')||(i===1&&t==='file')));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
}

// ─── 드래그 앤 드롭 ───
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) { document.getElementById('fileInput').files = e.dataTransfer.files; onFileChange(); }
});

function onFileChange() {
  const f = document.getElementById('fileInput').files[0];
  if (!f) return;
  document.getElementById('fileInfo').textContent = `${f.name} (${(f.size/1024).toFixed(1)} KB)`;
  document.getElementById('btnSendFile').disabled = false;
}

// ─── 마이크 녹음 ───
let mediaRecorder, audioChunks = [], recordedBlob = null;
let timerInterval, seconds = 0;
let audioCtx, analyser, animFrame, micStream;

function drawIdle(canvas) {
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth || 600;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = '#2a2a3d';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, canvas.height/2);
  ctx.lineTo(canvas.width, canvas.height/2);
  ctx.stroke();
}

function drawWave(analyser, canvas) {
  const buf = new Uint8Array(analyser.fftSize);
  const ctx = canvas.getContext('2d');
  function frame() {
    animFrame = requestAnimationFrame(frame);
    analyser.getByteTimeDomainData(buf);
    canvas.width = canvas.offsetWidth;
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0,0,W,H);
    const grad = ctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,'#6c63ff');
    grad.addColorStop(0.5,'#ff6584');
    grad.addColorStop(1,'#00e5a0');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i=0;i<buf.length;i++) {
      const x = i/buf.length*W;
      const y = (buf[i]/128-1)*(H/2-8)+H/2;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  frame();
}

async function toggleRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  recordedBlob = null;
  audioChunks = [];
  document.getElementById('btnSendMic').disabled = true;

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    setStatus('statusMic', '마이크 권한을 허용해 주세요.', 'err'); return;
  }

  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  audioCtx.createMediaStreamSource(micStream).connect(analyser);

  const canvas = document.getElementById('waveformCanvas');
  drawWave(analyser, canvas);

  mediaRecorder = new MediaRecorder(micStream);
  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
  mediaRecorder.onstop = () => {
    cancelAnimationFrame(animFrame);
    micStream.getTracks().forEach(t => t.stop());
    audioCtx.close();
    recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
    drawIdle(canvas);
    document.getElementById('btnRecord').innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg> 녹음 시작`;
    document.getElementById('btnRecord').className = 'btn primary';
    document.getElementById('recDot').classList.remove('pulse');
    document.getElementById('recLabel').textContent = '녹음 완료';
    document.getElementById('btnSendMic').disabled = false;
    clearInterval(timerInterval);
    setStatus('statusMic', `녹음 완료 (${document.getElementById('timer').textContent})`, 'ok');
  };
  mediaRecorder.start();

  // UI
  seconds = 0;
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('timer').className = 'timer recording';
  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }, 1000);
  document.getElementById('recDot').classList.add('pulse');
  document.getElementById('recLabel').textContent = '녹음 중...';
  document.getElementById('btnRecord').innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg> 녹음 중지`;
  document.getElementById('btnRecord').className = 'btn danger';
  setStatus('statusMic', '');
  document.getElementById('timer').className = 'timer recording';
}

// ─── 전송 공통 ───
async function sendToApi(blob, statusId) {
  const url = document.getElementById('apiUrl').value.trim();
  setStatus(statusId, '전송 중...', '');
  showLoading(true);
  const fd = new FormData();
  fd.append('file', blob, blob.name || 'recording.webm');
  try {
    const res = await fetch(url, { method: 'POST', body: fd });
    if (!res.ok) throw new Error(`서버 오류 ${res.status}`);
    const data = await res.json();
    showResult(data.text);
    setStatus(statusId, '변환 완료 ✓', 'ok');
  } catch(e) {
    setStatus(statusId, `오류: ${e.message}`, 'err');
    showResult(null);
  } finally {
    showLoading(false);
  }
}

function sendMic() {
  if (!recordedBlob) return;
  sendToApi(recordedBlob, 'statusMic');
}

function sendFile() {
  const f = document.getElementById('fileInput').files[0];
  if (!f) return;
  sendToApi(f, 'statusFile');
}

// ─── UI 헬퍼 ───
function showLoading(on) {
  document.getElementById('loadingBar').classList.toggle('active', on);
}

function showResult(text) {
  const box = document.getElementById('resultBox');
  const body = document.getElementById('resultText');
  if (text != null) {
    body.textContent = text;
    body.className = 'result-body filled';
    box.classList.add('has-result');
  } else {
    body.textContent = '변환에 실패했습니다.';
    body.className = 'result-body';
    box.classList.remove('has-result');
  }
}

function setStatus(id, msg, cls='') {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status' + (cls ? ' '+cls : '');
}

function copyResult() {
  const t = document.getElementById('resultText').textContent;
  navigator.clipboard.writeText(t).then(() => {
    const b = document.querySelector('.copy-btn');
    b.textContent = '복사됨 ✓'; setTimeout(()=>b.textContent='복사',1500);
  });
}

// 초기 파형
window.addEventListener('load', () => drawIdle(document.getElementById('waveformCanvas')));
window.addEventListener('resize', () => {
  if (!mediaRecorder || mediaRecorder.state !== 'recording')
    drawIdle(document.getElementById('waveformCanvas'));
});
</script>
</body>
</html>
